</head>

<body>
  <!-- HEADER SECTION START -->

    <nav class="navbar navbar-expand-lg navbar-light bg-light py-3 fixed-top">

            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <!-- HEADER SECTION END -->
  <!-- MAIN SECTION START -->
   
  <main>
      <div class="form">
        <h1>Work with Me!</h1>
        <form action="https://api.web3forms.com/submit" method="POST"> 
          <!-- Replace with your Access Key -->
          <input type="hidden" name="access_key" value="1d816c89-acc3-4c7c-87d7-2fa32f9b82d4">
      
          <!-- Form Inputs. Each input must have a name="" attribute -->
          <div class="userInfo"> 
            <section class="basicInfo">
                <div class="name form-outline my-2">
                  <input type="name" name="name" placeholder="Full Name" class="form-control form-control-lg" required/>
                </div>
                <div class="phone form-outline my-5">
                  <input 
                  oninput="javascript: if (this.value.length > this.maxLength) this.value = this.value.slice(0, this.maxLength);"
                  type="number" name="phone" placeholder="Phone" minlength="10" maxlength="10" class="form-control form-control-lg" required>
                </div>
                <div class="email form-outline my-5">
                  <input type="email" name="email" placeholder="Email" class="form-control form-control-lg" required/>
                </div>
              </section>
              
              <section class="businessInfo">
                <div class="businessName form-outline my-2">
                  <input type="businessName" name="businessName" placeholder="Business Name" class="form-control form-control-lg" required/>
                </div>
                <div class="socials form-outline my-5">
                  <input type="socials" name="socials" placeholder="Business Website, Socials, Links" class="form-control form-control-lg" required/>
                </div>
              </section>

              <section class="packageOpt">
                <div class="package form-outline my-5">
                  <div class="form-group">
                      <input name="package" placeholder="Package" class="form-control form-control-lg" disabled/>
                      <select class="package form-control" name="package" placeholder="Package">
                        <option></option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                      </select>
                    </div>
                </div>
              </section>
            </div> 

            <section class="message">
              <div class="subject form-outline my-5">
                <input type="name" name="subj" placeholder="Subject" class="form-control form-control-lg" required/>
              </div>
              <div class="text form-outline my-5">
                <textarea id="text" name="text" placeholder="Message" rows="8" class="form-control" required></textarea>
              </div> 
            </section>

          <div class="button">
            <button type="submit" class="btn">Submit</button>
          </div>
        </div>
   </main>
  <!-- MAIN SECTION END -->
